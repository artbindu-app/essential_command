  <script>
    (function markWebViewMode() {
      var ua = navigator.userAgent || '';
      var isEmbedded = window.self !== window.top;
      var isAndroidWebView = /\bwv\b/.test(ua) || /; wv\)/.test(ua) || /WebView/i.test(ua);
      if (isEmbedded || isAndroidWebView) {
        document.documentElement.classList.add('webview-mode');
      }
    })();

    var appConfig = window.APP_CONFIG || {};

    var webviewNavConfig = {
      hiddenHashes: appConfig.webviewNav && Array.isArray(appConfig.webviewNav.hiddenHashes)
        ? appConfig.webviewNav.hiddenHashes
        : []
    };

    function applyWebviewNavConfig() {
      var isMobileView = window.matchMedia('(max-width: 768px)').matches;
      var hiddenSet = new Set((webviewNavConfig.hiddenHashes || []).map(function (item) {
        return String(item || '').toLowerCase();
      }));

      var navItems = document.querySelectorAll('#myList li');
      navItems.forEach(function (li) {
        var link = li.querySelector('a[href^="#"]');
        if (!link) {
          return;
        }

        var hash = (link.getAttribute('href') || '').toLowerCase();
        var shouldHide = hiddenSet.has(hash) && !isMobileView;
        li.style.display = shouldHide ? 'none' : '';
      });
    }

    applyWebviewNavConfig();
    window.addEventListener('resize', applyWebviewNavConfig);

    var msgData = appConfig.messages || {};

    // Show default active option after refresh/first-reload
    var listItems = document.querySelectorAll('#myList li');
    var urlKey = window.location.hash ? window.location.hash.substring(1).toLowerCase() : '';
    var firstLink = listItems[0] ? listItems[0].querySelector('a') : null;
    var defaultHash = typeof appConfig.defaultHash === 'string' ? appConfig.defaultHash : '#windows';
    var defaultOption = defaultHash.replace(/^#/, '').toLowerCase()
      || (firstLink && firstLink.hash ? firstLink.hash.substring(1) : 'windows');
    var activeOption = urlKey || defaultOption;

    console.log('Active option: [Default] ' + activeOption);
    showData(activeOption);

    var activeLink = document.querySelector('#myList a[href="#' + activeOption + '"]');
    if (activeLink && activeLink.parentElement) {
      activeLink.parentElement.classList.add('active');
    }

    listItems.forEach(function (item) {
      item.addEventListener('click', function () {
        // Remove active class from all li elements
        listItems.forEach(function (li) {
          li.classList.remove('active');
        });

        // Add active class to the clicked li element
        this.classList.add('active');

        // Get key from href hash (fallback to li text)
        var link = this.querySelector('a');
        activeOption = link && link.hash
          ? link.hash.substring(1)
          : (this.textContent ? this.textContent.replace(/\s+/g, '') : '');
        console.log('Active option: [onClick] ' + activeOption);
        showData(activeOption);
      });
    });

    function showData(activeOption) {
      showHeaderMessage(activeOption);
      var contentSections = document.querySelectorAll('#showData > div');
      var selectedKey = activeOption ? activeOption.toLowerCase() : '';
      contentSections.forEach(function (item) {
        item.style.display = item.classList.contains(selectedKey) ? "block" : "none";
      });
    }

    function showHeaderMessage(msg) {
      msg = msg ? msg.toLowerCase().replace(/\-/g, '_') : 'about';
      document.getElementsByClassName("msg")[0].innerHTML = msgData[msg] || msgData.about || 'About';
    }
